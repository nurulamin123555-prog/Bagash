<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BAGASH Premium v14.0 Ultimate</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#fff;
overflow-x:hidden;
}

/* =======================
LOADER
======================= */

.loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#063b2d;
display:flex;
justify-content:center;
align-items:center;
z-index:999999;
}

.loader h1{
color:white;
font-size:60px;
letter-spacing:8px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:.5;transform:scale(1);}
50%{opacity:1;transform:scale(1.15);}
100%{opacity:.5;transform:scale(1);}
}

/* =======================
HEADER
======================= */

.header{
position:sticky;
top:0;
background:white;
height:80px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
border-bottom:1px solid #eee;
z-index:9999;
}

.left{
display:flex;
align-items:center;
gap:18px;
}

.menu-btn{
font-size:32px;
cursor:pointer;
font-weight:700;
color:#063b2d;
}

.logo img{
height:50px;
}

.nav{
display:flex;
gap:30px;
}

.nav a{
text-decoration:none;
color:#111;
font-weight:600;
font-size:15px;
}

.right{
display:flex;
align-items:center;
gap:20px;
}

.search-btn,
.cart-btn{
font-size:22px;
cursor:pointer;
}

.cart-badge{
background:#063b2d;
color:white;
padding:3px 8px;
border-radius:20px;
font-size:12px;
margin-left:4px;
}

/* =======================
SIDE MENU
======================= */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
opacity:0;
visibility:hidden;
transition:.4s;
z-index:9998;
}

.overlay.active{
opacity:1;
visibility:visible;
}

.side-menu{
position:fixed;
top:0;
left:-100%;
width:380px;
height:100%;
background:white;
overflow-y:auto;
transition:.4s;
z-index:99999;
box-shadow:0 0 30px rgba(0,0,0,.2);
}

.side-menu.active{
left:0;
}

.menu-top{
height:80px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
border-bottom:1px solid #eee;
}

.close-btn{
font-size:32px;
cursor:pointer;
}

.menu-link{
display:block;
padding:18px 25px;
border-bottom:1px solid #eee;
text-decoration:none;
color:#222;
font-weight:700;
transition:.3s;
}

.menu-link:hover{
background:#f8f8f8;
padding-left:35px;
color:#063b2d;
}

/* =======================
HERO
======================= */

.hero{
height:90vh;
background:
linear-gradient(
rgba(0,0,0,.35),
rgba(0,0,0,.35)
),
url('hero-banner.png');

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.hero-content{
color:white;
}

.hero-logo{
width:140px;
margin-bottom:20px;
animation:float 4s infinite;
}

@keyframes float{
50%{
transform:translateY(-12px);
}
}

.hero h1{
font-size:80px;
font-weight:800;
letter-spacing:10px;
}

.hero p{
margin-top:15px;
font-size:22px;
}

.hero-btn{
display:inline-block;
margin-top:30px;
padding:16px 40px;
background:white;
color:#063b2d;
text-decoration:none;
font-weight:700;
border-radius:4px;
}

/* =======================
CATEGORY GRID
======================= */

.categories{
padding:80px 20px;
}

.section-title{
text-align:center;
font-size:40px;
font-weight:800;
color:#063b2d;
margin-bottom:50px;
}

.grid{
max-width:1300px;
margin:auto;

display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
}

.card{
height:260px;
position:relative;
overflow:hidden;
border-radius:10px;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
transition:.5s;
}

.card:hover img{
transform:scale(1.1);
}

.card-name{
position:absolute;
bottom:0;
width:100%;
padding:20px;
background:linear-gradient(transparent,rgba(0,0,0,.85));
color:white;
font-size:22px;
font-weight:700;
}

@media(max-width:900px){

.nav{
display:none;
}

.grid{
grid-template-columns:1fr 1fr;
}

}

@media(max-width:600px){

.grid{
grid-template-columns:1fr;
}

.hero h1{
font-size:50px;
}

}

</style>

</head>

<body>

<div class="loader" id="loader">
<h1>BAGASH</h1>
</div>

<div class="side-menu" id="menu">

<div class="menu-top">
<h2>BAGASH</h2>

</div>

<a class="menu-link" href="women.html" target="_blank">Women</a>

<a class="menu-link" href="men.html" target="_blank">Men</a>

<a class="menu-link" href="kids.html" target="_blank">Kids</a>

<a class="menu-link" href="wedding.html" target="_blank">Wedding</a>

<a class="menu-link" href="home.html" target="_blank">Home</a>

<a class="menu-link" href="jewellery.html" target="_blank">Jewellery</a>

<a class="menu-link" href="watches.html" target="_blank">Watches</a>

<a class="menu-link" href="jerseys.html" target="_blank">Jerseys</a>

<a class="menu-link" href="skinhair.html" target="_blank">Skin & Hair</a>

<a class="menu-link" href="baga.html" target="_blank">BAGA Collection</a>

</div>

<header class="header">

<div class="left">

<div class="menu-btn" onclick="openMenu()">
☰
</div>

<div class="logo">
<img src="bagash-logo.png">
</div>

</div>

<nav class="nav">

<a href="men.html">MEN</a>
<a href="women.html">WOMEN</a>
<a href="jerseys.html">JERSEYS</a>
<a href="kids.html">KIDS</a>

</nav>

<div class="right">

<div class="search-btn">🔍</div>

<div class="cart-btn">
🛍️
<span class="cart-badge">0</span>
</div>

</div>

</header>

<section class="hero">

<div class="hero-content">

<img src="bagash-logo.png"
class="hero-logo">

<h1>BAGASH</h1>

<p>
Heritage • Fashion • Lifestyle
</p>

<a href="#categories"
class="hero-btn">

SHOP NOW

</a>

</div>

</section>

<section
class="categories"
id="categories">

<h2 class="section-title">

Shop By Category

</h2>

<div class="grid">

<a class="card" href="women.html">
<img src="women.jpeg">
<div class="card-name">Women</div>
</a>

<a class="card" href="men.html">
<img src="men.jpeg">
<div class="card-name">Men</div>
</a>

<a class="card" href="kids.html">
<img src="kids.jpeg">
<div class="card-name">Kids</div>
</a>

<a class="card" href="wedding.html">
<img src="wedding.jpeg">
<div class="card-name">Wedding</div>
</a>

<a class="card" href="homedecor.jpeg">
<img src="homedecor.jpeg">
<div class="card-name">Home</div>
</a>

<a class="card" href="jewellery.html">
<img src="jewellery.jpeg">
<div class="card-name">Jewellery</div>
</a>

</div>

</section>

<script>

window.onload=function(){

setTimeout(()=>{

document
.getElementById("loader")
.style.display="none";

},1500);

}

function openMenu(){

document
.getElementById("menu")
.classList.add("active");

document
.getElementById("overlay")
.classList.add("active");

}

function closeMenu(){

document
.getElementById("menu")
.classList.remove("active");

document
.getElementById("overlay")
.classList.remove("active");

}

</script>

</body>
</html>
